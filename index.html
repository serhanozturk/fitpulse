function getRestColor(elapsed, total) {
  if (elapsed >= total) return "#00FF88";
  const r = elapsed / total;
  if (r < 0.5) return `rgb(255,${Math.round(255*(r/0.5))},0)`;
  return `rgb(${Math.round(255*(1-(r-0.5)/0.5))},255,0)`;
}

function formatTime(h) {
  if (h <= 0) return "Hazır ✓";
  const hh = Math.floor(h), mm = Math.round((h-hh)*60);
  if (hh===0) return `${mm}dk`;
  if (mm===0) return `${hh}sa`;
  return `${hh}sa ${mm}dk`;
}

  const [exercises, setExercises] = useState(EXERCISES);
  const [apiStatus, setApiStatus] = useState("loading");
  const [showDrop, setShowDrop] = useState(false);
  const debRef = useRef(null);

  useEffect(() => {
    fetch("https://wger.de/api/v2/exerciseinfo/?format=json&language=2&limit=100&offset=0")
      .then(r => r.ok ? r.json() : Promise.reject())
      .then(data => {
        const mapped = (data.results||[])
          .filter(ex => ex.translations?.some(t=>t.language===2))
          .map(ex => {
            const tr = ex.translations.find(t=>t.language===2);
            const primary = [...new Set((ex.muscles||[]).flatMap(m=>WGER_MUSCLE_MAP[m.id]||[]))];
            const secondary = [...new Set((ex.muscles_secondary||[]).flatMap(m=>WGER_MUSCLE_MAP[m.id]||[]))];
            return {id:"w"+ex.id, name:tr?.name||"", primary, secondary};
          }).filter(ex=>ex.name&&ex.name.length>1);
        if (mapped.length > 5) {
          const merged = [...EXERCISES];
          mapped.forEach(a=>{ if(!merged.find(b=>b.name.toLowerCase()===a.name.toLowerCase())) merged.push(a); });
          setExercises(merged);
          setApiStatus("ok");
        } else setApiStatus("fallback");
      })
      .catch(()=>setApiStatus("fallback"));
  }, []);

  useEffect(() => {
    if (debRef.current) clearTimeout(debRef.current);
    if (!query.trim()) { setResults([]); setShowDrop(false); return; }
    debRef.current = setTimeout(() => {
      const q = query.toLowerCase();
      setResults(exercises.filter(ex=>ex.name.toLowerCase().includes(q)).slice(0,12));
      setShowDrop(true);
    }, 180);
  }, [query, exercises]);

  const select = (ex) => { onSelect(ex); setQuery(""); setResults([]); setShowDrop(false); };

  return (
    <div style={{position:"relative"}}>
      <input value={query} onChange={e=>setQuery(e.target.value)} onFocus={()=>results.length>0&&setShowDrop(true)}
        placeholder={`🔍 Egzersiz ara... (${exercises.length}${apiStatus==="ok"?" · wger ✓":""})`}
        style={{width:"100%",background:"#1A1F30",border:"1px solid #2A2E3E",borderRadius:10,padding:"10px 12px",color:"#E8ECF8",fontSize:13,outline:"none"}}
      />
      {showDrop && results.length>0 && (
        <div style={{position:"absolute",top:"100%",left:0,right:0,background:"#1A1F30",border:"1px solid #2A2E3E",borderRadius:"0 0 10px 10px",zIndex:200,maxHeight:230,overflowY:"auto",boxShadow:"0 8px 24px #000000AA"}}>
          {results.map(ex=>(
            <div key={ex.id} onMouseDown={()=>select(ex)}
              style={{padding:"9px 12px",cursor:"pointer",borderBottom:"1px solid #232840"}}
              onMouseEnter={e=>e.currentTarget.style.background="#232840"}
              onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              <div style={{fontSize:13,color:"#E8ECF8",fontWeight:600}}>{ex.name}</div>
              <div style={{fontSize:10,color:"#4A5068",marginTop:2}}>
                {ex.primary.length>0 && <><span style={{color:"#4A90D9"}}>Ana: </span>{ex.primary.map(m=>MUSCLE_INFO[m]?.name||m).join(", ")}</>}
                {ex.secondary.length>0 && <><span> · </span><span style={{color:"#6B9B8A"}}>Yan: </span>{ex.secondary.map(m=>MUSCLE_INFO[m]?.name||m).join(", ")}</>}
                {ex.primary.length===0&&ex.secondary.length===0 && <span style={{color:"#6B7280"}}>Genel kondisyon</span>}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function WeeklyPlanner({ onMusclesFromWorkout }) {
  const [activeDay, setActiveDay] = useState(0);
  const [workouts, setWorkouts] = useState(()=>{try{return JSON.parse(localStorage.getItem("fp_w2")||"{}");}catch{return {};}});
  const save = (w) => { setWorkouts(w); try{localStorage.setItem("fp_w2",JSON.stringify(w));}catch{} };
  const dk = DAY_KEYS[activeDay];
  const dayEx = workouts[dk] || [];

  const addEx = (ex) => {
    const entry = {id:Date.now(),name:ex.name,primary:ex.primary||[],secondary:ex.secondary||[],sets:[{reps:12,weight:""}]};
    save({...workouts,[dk]:[...dayEx,entry]});
  };
  const removeEx = (id) => save({...workouts,[dk]:dayEx.filter(e=>e.id!==id)});
  const addSet = (exId) => save({...workouts,[dk]:dayEx.map(e=>e.id===exId?{...e,sets:[...e.sets,{reps:e.sets[e.sets.length-1]?.reps||12,weight:e.sets[e.sets.length-1]?.weight||""}]}:e)});
  const removeSet = (exId,si) => save({...workouts,[dk]:dayEx.map(e=>e.id===exId&&e.sets.length>1?{...e,sets:e.sets.filter((_,i)=>i!==si)}:e)});
  const updateSet = (exId,si,field,val) => save({...workouts,[dk]:dayEx.map(e=>e.id===exId?{...e,sets:e.sets.map((s,i)=>i===si?{...s,[field]:val}:s)}:e)});

  const markDone = () => {
    const mm = {};
    dayEx.forEach(ex=>{
      ex.primary.forEach(m=>{if(MUSCLE_INFO[m])mm[m]={type:"primary"};});
      ex.secondary.forEach(m=>{if(MUSCLE_INFO[m]&&!mm[m])mm[m]={type:"secondary"};});
    });
    onMusclesFromWorkout(mm);
  };

  const dayCount = (d) => (workouts[DAY_KEYS[d]]||[]).length;
  const totalMuscles = () => { const s=new Set(); dayEx.forEach(ex=>{ex.primary.forEach(m=>s.add(m));ex.secondary.forEach(m=>s.add(m));}); return s.size; };

  return (
    <div style={{background:"#111827",borderRadius:16,overflow:"hidden",border:"1px solid #1E2235"}}>
      <div style={{display:"flex",overflowX:"auto",background:"#0D1121",borderBottom:"1px solid #1E2235"}}>
        {DAYS.map((d,i)=>(
          <button key={i} onClick={()=>setActiveDay(i)} style={{flex:"0 0 auto",padding:"10px 11px",background:"transparent",border:"none",
            borderBottom:activeDay===i?"2px solid #4A90D9":"2px solid transparent",color:activeDay===i?"#4A90D9":"#6B7280",
            cursor:"pointer",fontSize:11,fontWeight:activeDay===i?700:400,whiteSpace:"nowrap",position:"relative"}}>
            {d.slice(0,3)}
            {dayCount(i)>0 && <span style={{position:"absolute",top:4,right:1,background:"#4A90D9",color:"#fff",borderRadius:"50%",width:13,height:13,fontSize:8,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>{dayCount(i)}</span>}
          </button>
        ))}
      </div>
      <div style={{padding:14}}>
        <div style={{marginBottom:12}}><ExerciseSearch onSelect={addEx}/></div>
        {dayEx.length===0 ? (
          <div style={{textAlign:"center",padding:"20px 0",color:"#4A5068",fontSize:12}}>Egzersiz aramak için yukarıyı kullan 💪</div>
        ) : (
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {dayEx.map(ex=>(
              <div key={ex.id} style={{background:"#1A1F30",borderRadius:12,padding:12,border:"1px solid #2A2E3E"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:700,color:"#E8ECF8"}}>{ex.name}</div>
                    <div style={{fontSize:10,marginTop:3,lineHeight:1.8}}>
                      {ex.primary.map(m=><span key={m} style={{background:"#1E3A5F",color:"#4A90D9",borderRadius:4,padding:"1px 6px",marginRight:3,fontSize:9,fontWeight:700}}>{MUSCLE_INFO[m]?.name||m}</span>)}
                      {ex.secondary.map(m=><span key={m} style={{background:"#1E2830",color:"#6B9B8A",borderRadius:4,padding:"1px 6px",marginRight:3,fontSize:9}}>{MUSCLE_INFO[m]?.name||m}</span>)}
                      {ex.primary.length===0&&ex.secondary.length===0&&<span style={{color:"#4A5068",fontSize:9}}>Genel kondisyon</span>}
                    </div>
                  </div>
                  <button onClick={()=>removeEx(ex.id)} style={{background:"transparent",border:"none",color:"#4A5068",cursor:"pointer",fontSize:18,lineHeight:1,padding:"0 4px"}}>×</button>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"22px 1fr 1fr 24px",gap:4,alignItems:"center",marginBottom:6}}>
                  <div style={{fontSize:9,color:"#4A5068",textAlign:"center"}}>Set</div>
                  <div style={{fontSize:9,color:"#4A5068",textAlign:"center"}}>Tekrar</div>
                  <div style={{fontSize:9,color:"#4A5068",textAlign:"center"}}>Ağırlık (kg)</div>
                  <div/>
                  {ex.sets.map((set,si)=>[
                    <div key={"l"+si} style={{fontSize:11,color:"#6B7280",textAlign:"center",fontWeight:700}}>{si+1}</div>,
                    <input key={"r"+si} type="number" value={set.reps} onChange={e=>updateSet(ex.id,si,"reps",e.target.value)}
                      style={{background:"#232840",border:"1px solid #2A2E3E",borderRadius:6,padding:"7px 4px",color:"#E8ECF8",fontSize:14,textAlign:"center",outline:"none"}}/>,
                    <input key={"w"+si} type="number" value={set.weight} onChange={e=>updateSet(ex.id,si,"weight",e.target.value)} placeholder="—"
                      style={{background:"#232840",border:"1px solid #2A2E3E",borderRadius:6,padding:"7px 4px",color:"#E8ECF8",fontSize:14,textAlign:"center",outline:"none"}}/>,
                    <button key={"d"+si} onClick={()=>removeSet(ex.id,si)} style={{background:"transparent",border:"none",color:"#4A5068",cursor:"pointer",fontSize:15,lineHeight:1}}>−</button>
                  ])}
                </div>
                <button onClick={()=>addSet(ex.id)} style={{width:"100%",background:"#232840",border:"1px dashed #2A2E3E",borderRadius:8,padding:"6px",color:"#4A5068",cursor:"pointer",fontSize:11}}>+ Set ekle</button>
              </div>
            ))}
          </div>
        )}
        {dayEx.length>0 && (
          <button onClick={markDone} style={{width:"100%",marginTop:14,background:"linear-gradient(135deg,#1E5C2A,#1A7A30)",border:"1px solid #2E8A40",borderRadius:12,padding:"13px",color:"#00FF88",fontWeight:800,fontSize:13,cursor:"pointer"}}>
            ⚡ {DAYS[activeDay]} Antrenmanını Tamamla · {totalMuscles()} kas grubu işaretlenecek
          </button>
        )}
      </div>
    </div>
  );
}

function App() {
  const [gender, setGender] = useState("male");
  const [activeMuscles, setActiveMuscles] = useState(()=>{try{const s=localStorage.getItem("fp_muscles");return s?JSON.parse(s):{};}catch{return {};}});
  const [, setTick] = useState(0);
  const [selMuscle, setSelMuscle] = useState(null);
  const [tab, setTab] = useState("map");
  const [meas, setMeas] = useState(()=>{try{return JSON.parse(localStorage.getItem("fp_meas")||"{}");}catch{return {height:"",weight:"",arm:"",shoulder:"",chest:"",waist:"",leg:"",back:"",hip:""};}});
  const [bodyFat, setBodyFat] = useState(null);

  useEffect(()=>{ const t=setInterval(()=>setTick(n=>n+1),60000); return()=>clearInterval(t); },[]);
  useEffect(()=>{ try{localStorage.setItem("fp_muscles",JSON.stringify(activeMuscles));}catch{} },[activeMuscles]);
  useEffect(()=>{ try{localStorage.setItem("fp_meas",JSON.stringify(meas));}catch{} },[meas]);

  const clickMuscle = (m, isPrimary=true) => {
    setSelMuscle(m);
    setActiveMuscles(p=>({...p,[m]:{startTime:Date.now(),isPrimary}}));
  };

  const fromWorkout = (mm) => {
    const now = Date.now();
    setActiveMuscles(p=>{
      const n={...p};
      Object.entries(mm).forEach(([m,info])=>{ if(MUSCLE_INFO[m]) n[m]={startTime:now,isPrimary:info.type==="primary"}; });
      return n;
    });
    setTab("map");
    const keys=Object.keys(mm);
    if(keys[0]) setTimeout(()=>setSelMuscle(keys[0]),150);
  };

  const resetMuscle = (m) => { setActiveMuscles(p=>{const n={...p};delete n[m];return n;}); if(selMuscle===m)setSelMuscle(null); };
  const resetAll = () => { setActiveMuscles({}); setSelMuscle(null); };

  const getStatus = (m) => {
    const a=activeMuscles[m]; if(!a) return null;
    const elapsed=(Date.now()-a.startTime)/3600000, total=MUSCLE_INFO[m].rest;
    return {elapsed,total,remaining:Math.max(0,total-elapsed),done:elapsed>=total};
  };

  const calcBF = () => {
    const h=parseFloat(meas.height),w=parseFloat(meas.weight),waist=parseFloat(meas.waist);
    if(!h||!w||!waist){alert("Boy, kilo ve bel ölçüsü giriniz!");return;}
    let bf;
    if(gender==="male"){const neck=38;bf=86.01*Math.log10(waist-neck)-70.041*Math.log10(h)+36.76;}
    else{const hip=parseFloat(meas.hip)||waist*1.1,neck=33;bf=163.205*Math.log10(waist+hip-neck)-97.684*Math.log10(h)-78.387;}
    setBodyFat(Math.max(5,Math.min(60,bf)).toFixed(1));
  };

  const activeKeys = Object.keys(activeMuscles);
  const ts = (t) => ({
    flex:1,padding:"11px 4px",background:"transparent",border:"none",
    borderBottom:tab===t?"2px solid #4A90D9":"2px solid transparent",
    color:tab===t?"#4A90D9":"#6B7280",cursor:"pointer",fontSize:10,
    fontWeight:tab===t?700:400,letterSpacing:0.3,
  });

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0A0E1A 0%,#0D1328 60%,#080C18 100%)",color:"#E8ECF8",fontFamily:"'Inter',-apple-system,sans-serif",paddingBottom:40}}>
      {/* HEADER */}
      <div style={{background:"linear-gradient(90deg,#0A0E1A,#111827,#0A0E1A)",borderBottom:"1px solid #1E2235",padding:"12px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{fontSize:9,color:"#4A90D9",letterSpacing:3,textTransform:"uppercase",fontWeight:700}}>MUSCLE TRACKER</div>
          <div style={{fontSize:19,fontWeight:900,color:"#E8ECF8",letterSpacing:-0.5}}>FitPulse</div>
        </div>
        <div style={{display:"flex",background:"#1A1F30",borderRadius:10,padding:3,gap:2,border:"1px solid #2A2E3E"}}>
          {["male","female"].map(g=>(
            <button key={g} onClick={()=>setGender(g)} style={{padding:"6px 10px",borderRadius:7,border:"none",background:gender===g?(g==="male"?"#4A90D9":"#D94AB0"):"transparent",color:gender===g?"#fff":"#6B7280",fontWeight:700,fontSize:11,cursor:"pointer"}}>
              {g==="male"?"♂ Erkek":"♀ Kadın"}
            </button>
          ))}
        </div>
      </div>

      {/* TABS */}
      <div style={{display:"flex",borderBottom:"1px solid #1E2235",background:"#0D1121"}}>
        <button style={ts("map")} onClick={()=>setTab("map")}>🫁 KAS HARİTASI</button>
        <button style={ts("weekly")} onClick={()=>setTab("weekly")}>
          📅 PROGRAM
          {activeKeys.length>0&&<span style={{marginLeft:4,background:"#4A90D9",color:"#fff",borderRadius:"50%",width:15,height:15,fontSize:8,display:"inline-flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>{activeKeys.length}</span>}
        </button>
        <button style={ts("measure")} onClick={()=>setTab("measure")}>📏 ÖLÇÜMLER</button>
      </div>

      <div style={{maxWidth:640,margin:"0 auto",padding:"0 12px"}}>

        {/* ── KAS HARİTASI ── */}

          <div style={{display:"flex",gap:10,marginTop:14,alignItems:"flex-start"}}>
            <div style={{background:"linear-gradient(180deg,#111827,#0D1121)",borderRadius:16,padding:"10px 4px",border:"1px solid #1E2235",flex:"0 0 164px",display:"flex",flexDirection:"column",alignItems:"center"}}>
              <div style={{fontSize:8,color:"#4A5068",marginBottom:5,letterSpacing:1}}>KASA TIKLA</div>
              {gender==="male"
                ? <MaleFigure activeMuscles={activeMuscles} onMuscleClick={clickMuscle}/>

                        <div style={{width:7,height:7,borderRadius:"50%",background:color,boxShadow:`0 0 5px ${color}`,flexShrink:0}}/>
                        <span style={{flex:1,fontSize:11,color:"#C0C8E0"}}>{MUSCLE_INFO[m].name}</span>

                        <span style={{fontSize:10,color,fontWeight:600}}>{st?.done?"Hazır ✓":formatTime(st?.remaining||0)}</span>

              {activeKeys.length===0&&!selMuscle && (
                <div style={{background:"#111827",borderRadius:13,padding:12,border:"1px solid #1E2235"}}>
                  <div style={{fontSize:9,color:"#4A5068",marginBottom:9,letterSpacing:1,textTransform:"uppercase"}}>RENK REHBERİ</div>
                  {[{color:"#FF2222",label:"Yeni çalışıldı — dinlen"},{color:"#FFBB00",label:"Toparlanıyor..."},{color:"#00FF88",label:"Hazır — tekrar antrenman!"}].map(x=>(
                    <div key={x.color} style={{display:"flex",alignItems:"center",gap:7,marginBottom:7}}>
                      <div style={{width:22,height:6,borderRadius:3,background:x.color,boxShadow:`0 0 5px ${x.color}88`,flexShrink:0}}/>
                      <span style={{fontSize:10,color:"#8892A8"}}>{x.label}</span>
                    </div>
                  ))}
                  <div style={{marginTop:10,padding:"8px 9px",background:"#1A1F30",borderRadius:8}}>
                    <div style={{fontSize:10,color:"#6B9B8A"}}>💡 <strong style={{color:"#E8ECF8"}}>PROGRAM</strong> sekmesine geç → egzersiz ekle → "Antrenmanı Tamamla" → kaslar otomatik işaretlenir!</div>
                  </div>
                </div>
              )}
            </div>
          </div>
        )}

        {/* ── HAFTALIK PROGRAM ── */}
        {tab==="weekly" && (
          <div style={{marginTop:14}}>
            <WeeklyPlanner onMusclesFromWorkout={fromWorkout}/>
            <div style={{marginTop:10,background:"#111827",borderRadius:11,padding:"9px 13px",border:"1px solid #1E2235"}}>
              <div style={{fontSize:10,color:"#4A5068"}}>
                ℹ️ wger.de veritabanından yüklenir. <span style={{color:"#4A90D9"}}>Mavi</span> = ana kas · <span style={{color:"#6B9B8A"}}>Yeşil</span> = yan kas. Program kaydedilir (localStorage).
              </div>
            </div>

            <div style={{fontSize:10,color:"#4A5068",marginBottom:13,letterSpacing:1,textTransform:"uppercase"}}>Vücut Ölçümleri</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
              {[
                {key:"height",label:"Boy",unit:"cm",e:"📐"},{key:"weight",label:"Kilo",unit:"kg",e:"⚖️"},
                {key:"arm",label:"Kol",unit:"cm",e:"💪"},{key:"shoulder",label:"Omuz",unit:"cm",e:"🏋️"},
                {key:"chest",label:"Göğüs",unit:"cm",e:"🫁"},{key:"waist",label:"Bel",unit:"cm",e:"📏"},
                {key:"leg",label:"Bacak",unit:"cm",e:"🦵"},{key:"back",label:"Sırt",unit:"cm",e:"🔙"},
                ...(gender==="female"?[{key:"hip",label:"Kalça",unit:"cm",e:"🍑"}]:[])
              ].map(f=>(
                <div key={f.key}>
                  <label style={{fontSize:9,color:"#6B7280",display:"block",marginBottom:3}}>{f.e} {f.label} ({f.unit})</label>
                  <input type="number" value={meas[f.key]||""} onChange={e=>setMeas(p=>({...p,[f.key]:e.target.value}))} placeholder="—"
                    style={{width:"100%",background:"#1A1F30",border:"1px solid #2A2E3E",borderRadius:8,padding:"9px 10px",color:"#E8ECF8",fontSize:15,outline:"none"}}/>
                </div>
              ))}
            </div>
            <button onClick={calcBF} style={{width:"100%",background:"linear-gradient(135deg,#4A90D9,#2B6BBF)",border:"none",borderRadius:12,padding:"13px",color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer"}}>
              Yağ Oranını Hesapla
            </button>
            {bodyFat!==null && (
              <div style={{marginTop:13,background:"linear-gradient(135deg,#1A1F30,#0D1422)",borderRadius:14,padding:15,border:"1px solid #2A3A4A",textAlign:"center"}}>
                <div style={{fontSize:9,color:"#4A5068",letterSpacing:2,marginBottom:5,textTransform:"uppercase"}}>Tahmini Vücut Yağ Oranı</div>
                <div style={{fontSize:42,fontWeight:900,lineHeight:1,color:parseFloat(bodyFat)<(gender==="male"?18:25)?"#00FF88":parseFloat(bodyFat)<(gender==="male"?25:32)?"#FFBB00":"#FF4444"}}>
                  {bodyFat}%
                </div>
                <div style={{fontSize:11,color:"#8892A8",marginTop:5}}>
                  {(()=>{const bf=parseFloat(bodyFat);
                    if(gender==="male"){if(bf<6)return"🏅 Sporcu";if(bf<14)return"💪 Fit — ideal";if(bf<18)return"✅ Sağlıklı";if(bf<25)return"⚠️ Ortalama";return"🔴 Yüksek";}
                    else{if(bf<14)return"🏅 Sporcu";if(bf<21)return"💪 Fit — ideal";if(bf<25)return"✅ Sağlıklı";if(bf<32)return"⚠️ Ortalama";return"🔴 Yüksek";}
                  })()}
                </div>
                <div style={{height:7,background:"#1A1F30",borderRadius:4,overflow:"hidden",margin:"12px 0 4px"}}>
                  <div style={{height:"100%",width:`${Math.min(100,(parseFloat(bodyFat)/(gender==="male"?40:50))*100)}%`,background:"linear-gradient(90deg,#00FF88,#FFBB00,#FF4444)",borderRadius:4}}/>
                </div>
                {meas.height&&meas.weight && (
                  <div style={{display:"flex",justifyContent:"space-around",padding:"10px",background:"#1A1F30",borderRadius:10,marginTop:10}}>
                    <div><div style={{fontSize:15,fontWeight:700,color:"#4A90D9"}}>{(parseFloat(meas.weight)/((parseFloat(meas.height)/100)**2)).toFixed(1)}</div><div style={{fontSize:8,color:"#6B7280"}}>BMI</div></div>
                    {meas.waist&&<div><div style={{fontSize:15,fontWeight:700,color:"#4A90D9"}}>{(parseFloat(meas.waist)/parseFloat(meas.height)).toFixed(2)}</div><div style={{fontSize:8,color:"#6B7280"}}>Bel/Boy</div></div>}
                    <div><div style={{fontSize:15,fontWeight:700,color:"#4A90D9"}}>{(parseFloat(meas.weight)*(1-parseFloat(bodyFat)/100)).toFixed(1)}kg</div><div style={{fontSize:8,color:"#6B7280"}}>Yağsız</div></div>
                  </div>
                )}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
