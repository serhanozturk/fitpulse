// ─── YARDIMCILAR ─────────────────────────────────────────────────
function rc(elapsed, total) {
  if (elapsed >= total) return "#00FF88";
  const r = elapsed / total;
  if (r < 0.5) return `rgb(255,${Math.round(255*(r/0.5))},0)`;
  return `rgb(${Math.round(255*(1-(r-0.5)/0.5))},255,0)`;
}

function ft(h) {
  if (h <= 0) return "Hazır ✓";
  const hh = Math.floor(h), mm = Math.round((h-hh)*60);
  if (hh===0) return mm+"dk";
  if (mm===0) return hh+"sa";
  return hh+"sa "+mm+"dk";
}

function ls(key, def) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; }
  catch { return def; }
}
function ss(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }

function ExSearch({ onSelect }) {
  const [q, setQ] = useState("");
  const [exList, setExList] = useState(EX);
  const [apiOk, setApiOk] = useState(false);
  const [show, setShow] = useState(false);
  const deb = useRef(null);

  const results = q.trim()
    ? exList.filter(x => x.name.toLowerCase().includes(q.toLowerCase())).slice(0,12)
    : [];

  useEffect(() => {
    fetch("https://wger.de/api/v2/exerciseinfo/?format=json&language=2&limit=100")
      .then(r => r.ok ? r.json() : Promise.reject())
      .then(data => {
        const mapped = (data.results||[])
          .filter(x => x.translations?.some(t=>t.language===2))
          .map(x => {
            const tr = x.translations.find(t=>t.language===2);
            const p = [...new Set((x.muscles||[]).flatMap(m=>WGER_MAP[m.id]||[]))];
            const s = [...new Set((x.muscles_secondary||[]).flatMap(m=>WGER_MAP[m.id]||[]))];
            return {id:"w"+x.id, name:tr.name||"", p, s};
          }).filter(x=>x.name.length>1);
        if (mapped.length > 5) {
          const merged = [...EX];
          mapped.forEach(a=>{ if(!merged.find(b=>b.name.toLowerCase()===a.name.toLowerCase())) merged.push({...a, primary:a.p, secondary:a.s}); });
          setExList(merged);
          setApiOk(true);
        }
      }).catch(()=>{});
  }, []);

  const sel = (ex) => { onSelect(ex); setQ(""); setShow(false); };

  return e("div", {style:{position:"relative"}},
    e("input", {
      value: q,
      onChange: ev => { setQ(ev.target.value); setShow(true); },
      onFocus: () => results.length && setShow(true),
      placeholder: "🔍 Egzersiz ara... (" + exList.length + (apiOk?" · wger ✓":"") + ")",
      style:{width:"100%",background:"#1A1F30",border:"1px solid #2A2E3E",borderRadius:10,padding:"10px 12px",color:"#E8ECF8",fontSize:13,outline:"none"}
    }),
    show && results.length > 0 && e("div", {
      style:{position:"absolute",top:"100%",left:0,right:0,background:"#1A1F30",border:"1px solid #2A2E3E",borderRadius:"0 0 10px 10px",zIndex:300,maxHeight:220,overflowY:"auto",boxShadow:"0 8px 24px #000000BB"}
    },
      results.map(ex => {
        const pArr = ex.p || ex.primary || [];
        const sArr = ex.s || ex.secondary || [];
        return e("div", {
          key: ex.id,
          className: "dropdown-item",
          onMouseDown: () => sel(ex),
          style:{padding:"9px 12px",cursor:"pointer",borderBottom:"1px solid #232840"}
        },
          e("div", {style:{fontSize:13,color:"#E8ECF8",fontWeight:600}}, ex.name),
          e("div", {style:{fontSize:10,color:"#4A5068",marginTop:2}},
            pArr.length > 0 && e("span", null, e("span",{style:{color:"#4A90D9"}},"Ana: "), pArr.map(m=>MI[m]?.name||m).join(", ")),
            sArr.length > 0 && e("span", null, " · ", e("span",{style:{color:"#6B9B8A"}},"Yan: "), sArr.map(m=>MI[m]?.name||m).join(", ")),
            pArr.length===0 && sArr.length===0 && e("span",{style:{color:"#6B7280"}},"Genel kondisyon")

      })

function WeeklyPlanner({ onDone }) {
  const [day, setDay] = useState(0);
  const [wk, setWk] = useState(() => ls("fp_wk", {}));
  const sv = (w) => { setWk(w); ss("fp_wk", w); };
  const dk = DK[day];
  const dayEx = wk[dk] || [];

  const addEx = (ex) => {
    const pArr = ex.p || ex.primary || [];
    const sArr = ex.s || ex.secondary || [];
    sv({...wk, [dk]: [...dayEx, {id:Date.now(), name:ex.name, p:pArr, s:sArr, sets:[{r:12,w:""}]}]});
  };
  const delEx = (id) => sv({...wk, [dk]: dayEx.filter(x=>x.id!==id)});
  const addSet = (id) => sv({...wk, [dk]: dayEx.map(x=>x.id===id?{...x,sets:[...x.sets,{r:x.sets[x.sets.length-1]?.r||12,w:""}]}:x)});
  const delSet = (id,si) => sv({...wk, [dk]: dayEx.map(x=>x.id===id&&x.sets.length>1?{...x,sets:x.sets.filter((_,i)=>i!==si)}:x)});
  const updSet = (id,si,f,v) => sv({...wk, [dk]: dayEx.map(x=>x.id===id?{...x,sets:x.sets.map((s,i)=>i===si?{...s,[f]:v}:s)}:x)});

  const markDone = () => {
    const mm = {};
    dayEx.forEach(ex=>{
      ex.p.forEach(m=>{ if(MI[m]) mm[m]={type:"primary"}; });
      ex.s.forEach(m=>{ if(MI[m]&&!mm[m]) mm[m]={type:"secondary"}; });
    });
    onDone(mm);
  };

  const dc = (i) => (wk[DK[i]]||[]).length;
  const tm = () => { const s=new Set(); dayEx.forEach(x=>{x.p.forEach(m=>s.add(m));x.s.forEach(m=>s.add(m));}); return s.size; };

  return e("div", {style:{background:"#111827",borderRadius:16,overflow:"hidden",border:"1px solid #1E2235"}},
    // Gün tabları
    e("div", {style:{display:"flex",overflowX:"auto",background:"#0D1121",borderBottom:"1px solid #1E2235"}},
      DAYS.map((d,i) => e("button", {
        key:i, onClick:()=>setDay(i),
        style:{flex:"0 0 auto",padding:"10px 11px",background:"transparent",border:"none",
          borderBottom:day===i?"2px solid #4A90D9":"2px solid transparent",
          color:day===i?"#4A90D9":"#6B7280",cursor:"pointer",fontSize:11,
          fontWeight:day===i?700:400,whiteSpace:"nowrap",position:"relative"}
      },
        d.slice(0,3),
        dc(i)>0 && e("span",{style:{position:"absolute",top:4,right:1,background:"#4A90D9",color:"#fff",borderRadius:"50%",width:13,height:13,fontSize:8,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}, dc(i))
      ))
    ),
    e("div", {style:{padding:14}},
      e("div", {style:{marginBottom:12}}, e(ExSearch, {onSelect:addEx})),
      dayEx.length === 0
        ? e("div",{style:{textAlign:"center",padding:"20px 0",color:"#4A5068",fontSize:12}},"Egzersiz aramak için yukarıyı kullan 💪")
        : e("div",{style:{display:"flex",flexDirection:"column",gap:10}},
            dayEx.map(ex =>
              e("div",{key:ex.id,style:{background:"#1A1F30",borderRadius:12,padding:12,border:"1px solid #2A2E3E"}},
                // Başlık satırı
                e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}},
                  e("div",null,
                    e("div",{style:{fontSize:13,fontWeight:700,color:"#E8ECF8"}},ex.name),
                    e("div",{style:{fontSize:10,marginTop:3,lineHeight:1.8}},
                      ex.p.map(m=>e("span",{key:m,style:{background:"#1E3A5F",color:"#4A90D9",borderRadius:4,padding:"1px 6px",marginRight:3,fontSize:9,fontWeight:700}},MI[m]?.name||m)),
                      ex.s.map(m=>e("span",{key:m,style:{background:"#1E2830",color:"#6B9B8A",borderRadius:4,padding:"1px 6px",marginRight:3,fontSize:9}},MI[m]?.name||m)),
                      ex.p.length===0&&ex.s.length===0&&e("span",{style:{color:"#4A5068",fontSize:9}},"Genel kondisyon")
                    )
                  ),
                  e("button",{onClick:()=>delEx(ex.id),style:{background:"transparent",border:"none",color:"#4A5068",cursor:"pointer",fontSize:18,lineHeight:1,padding:"0 4px"}},"×")
                ),
                // Set tablosu
                e("div",{style:{display:"grid",gridTemplateColumns:"22px 1fr 1fr 24px",gap:4,alignItems:"center",marginBottom:6}},
                  e("div",{style:{fontSize:9,color:"#4A5068",textAlign:"center"}},"Set"),
                  e("div",{style:{fontSize:9,color:"#4A5068",textAlign:"center"}},"Tekrar"),
                  e("div",{style:{fontSize:9,color:"#4A5068",textAlign:"center"}},"Ağırlık (kg)"),
                  e("div",null),
                  ...ex.sets.flatMap((set,si)=>[

              )

      dayEx.length > 0 && e("button",{onClick:markDone,style:{width:"100%",marginTop:14,background:"linear-gradient(135deg,#1E5C2A,#1A7A30)",border:"1px solid #2E8A40",borderRadius:12,padding:"13px",color:"#00FF88",fontWeight:800,fontSize:13,cursor:"pointer"}},
        "⚡ "+DAYS[day]+" Antrenmanını Tamamla · "+tm()+" kas grubu işaretlenecek"
      )
    )
  );
}

// ─── ÖLÇÜMLER ─────────────────────────────────────────────────────
function Measures({ gender }) {
  const [m, setM] = useState(() => ls("fp_meas", {height:"",weight:"",arm:"",shoulder:"",chest:"",waist:"",leg:"",back:"",hip:""}));
  const [bf, setBf] = useState(null);
  const upd = (k,v) => { const n={...m,[k]:v}; setM(n); ss("fp_meas",n); };

  const calc = () => {
    const h=parseFloat(m.height),w=parseFloat(m.weight),waist=parseFloat(m.waist);
    if(!h||!w||!waist){alert("Boy, kilo ve bel ölçüsü giriniz!");return;}
    let b;
    if(gender==="male"){b=86.01*Math.log10(waist-38)-70.041*Math.log10(h)+36.76;}
    else{const hip=parseFloat(m.hip)||waist*1.1;b=163.205*Math.log10(waist+hip-33)-97.684*Math.log10(h)-78.387;}
    setBf(Math.max(5,Math.min(60,b)).toFixed(1));
  };

  const fields = [
    {k:"height",l:"Boy",u:"cm",em:"📐"},{k:"weight",l:"Kilo",u:"kg",em:"⚖️"},
    {k:"arm",l:"Kol",u:"cm",em:"💪"},{k:"shoulder",l:"Omuz",u:"cm",em:"🏋️"},
    {k:"chest",l:"Göğüs",u:"cm",em:"🫁"},{k:"waist",l:"Bel",u:"cm",em:"📏"},
    {k:"leg",l:"Bacak",u:"cm",em:"🦵"},{k:"back",l:"Sırt",u:"cm",em:"🔙"},
    ...(gender==="female"?[{k:"hip",l:"Kalça",u:"cm",em:"🍑"}]:[])
  ];

  const bfColor = bf ? (parseFloat(bf)<(gender==="male"?18:25)?"#00FF88":parseFloat(bf)<(gender==="male"?25:32)?"#FFBB00":"#FF4444") : "#fff";
  const bfLabel = bf ? (()=>{
    const b=parseFloat(bf);
    if(gender==="male"){if(b<6)return"🏅 Sporcu";if(b<14)return"💪 Fit — ideal";if(b<18)return"✅ Sağlıklı";if(b<25)return"⚠️ Ortalama";return"🔴 Yüksek";}
    else{if(b<14)return"🏅 Sporcu";if(b<21)return"💪 Fit — ideal";if(b<25)return"✅ Sağlıklı";if(b<32)return"⚠️ Ortalama";return"🔴 Yüksek";}
  })() : "";

  return e("div",{style:{marginTop:14,background:"#111827",borderRadius:16,padding:16,border:"1px solid #1E2235"}},
    e("div",{style:{fontSize:10,color:"#4A5068",marginBottom:13,letterSpacing:1,textTransform:"uppercase"}},"Vücut Ölçümleri"),
    e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}},
      fields.map(f=>e("div",{key:f.k},
        e("label",{style:{fontSize:9,color:"#6B7280",display:"block",marginBottom:3}},f.em+" "+f.l+" ("+f.u+")"),
        e("input",{type:"number",value:m[f.k]||"",onChange:ev=>upd(f.k,ev.target.value),placeholder:"—",
          style:{width:"100%",background:"#1A1F30",border:"1px solid #2A2E3E",borderRadius:8,padding:"9px 10px",color:"#E8ECF8",fontSize:15,outline:"none"}})
      ))
    ),
    e("button",{onClick:calc,style:{width:"100%",background:"linear-gradient(135deg,#4A90D9,#2B6BBF)",border:"none",borderRadius:12,padding:"13px",color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer"}},
      "Yağ Oranını Hesapla"
    ),
    bf && e("div",{style:{marginTop:13,background:"linear-gradient(135deg,#1A1F30,#0D1422)",borderRadius:14,padding:15,border:"1px solid #2A3A4A",textAlign:"center"}},
      e("div",{style:{fontSize:9,color:"#4A5068",letterSpacing:2,marginBottom:5,textTransform:"uppercase"}},"Tahmini Vücut Yağ Oranı"),
      e("div",{style:{fontSize:42,fontWeight:900,lineHeight:1,color:bfColor}},bf+"%"),
      e("div",{style:{fontSize:11,color:"#8892A8",marginTop:5}},bfLabel),
      e("div",{style:{height:7,background:"#1A1F30",borderRadius:4,overflow:"hidden",margin:"12px 0 4px"}},
        e("div",{style:{height:"100%",width:Math.min(100,(parseFloat(bf)/(gender==="male"?40:50))*100)+"%",background:"linear-gradient(90deg,#00FF88,#FFBB00,#FF4444)",borderRadius:4}})
      ),
      m.height && m.weight && e("div",{style:{display:"flex",justifyContent:"space-around",padding:"10px",background:"#1A1F30",borderRadius:10,marginTop:10}},
        e("div",null,
          e("div",{style:{fontSize:15,fontWeight:700,color:"#4A90D9"}},(parseFloat(m.weight)/((parseFloat(m.height)/100)**2)).toFixed(1)),
          e("div",{style:{fontSize:8,color:"#6B7280"}},"BMI")
        ),
        m.waist && e("div",null,
          e("div",{style:{fontSize:15,fontWeight:700,color:"#4A90D9"}},(parseFloat(m.waist)/parseFloat(m.height)).toFixed(2)),
          e("div",{style:{fontSize:8,color:"#6B7280"}},"Bel/Boy")
        ),
        e("div",null,
          e("div",{style:{fontSize:15,fontWeight:700,color:"#4A90D9"}},(parseFloat(m.weight)*(1-parseFloat(bf)/100)).toFixed(1)+"kg"),
          e("div",{style:{fontSize:8,color:"#6B7280"}},"Yağsız Kütle")
        )
      )
    )
  );
}

          })(),
          // Tüm aktif kaslar listesi
          akeys.length>0&&e("div",{style:{background:"#111827",borderRadius:13,padding:11,border:"1px solid #1E2235"}},
            e("div",{style:{fontSize:8,color:"#4A5068",letterSpacing:1,marginBottom:7,textTransform:"uppercase"}},"Dinlenme Takibi"),
            akeys.map(m=>{
              const st=getStatus(m), color=st?rc(st.elapsed,st.total):"#2A2E3E";
              const isPrim=am[m]?.isPrimary;
              return e("div",{key:m,onClick:()=>setSel(m),style:{
                display:"flex",alignItems:"center",gap:7,padding:"6px 7px",
                background:sel===m?"#1A1F30":"transparent",borderRadius:8,cursor:"pointer",
                border:"1px solid "+(sel===m?color+"44":"transparent"),marginBottom:3
              }},
                e("div",{style:{width:7,height:7,borderRadius:"50%",background:color,boxShadow:"0 0 5px "+color,flexShrink:0}}),
                e("span",{style:{flex:1,fontSize:11,color:"#C0C8E0"}},MI[m].name),
                isPrim!==undefined&&e("span",{style:{fontSize:8,color:isPrim?"#4A90D9":"#6B9B8A",marginRight:3}},isPrim?"Ana":"Yan"),
                e("span",{style:{fontSize:10,color,fontWeight:600}},st?.done?"Hazır ✓":ft(st?.remaining||0))
              );
            })
          ),
          // Boş durum
          akeys.length===0&&!sel&&e("div",{style:{background:"#111827",borderRadius:13,padding:12,border:"1px solid #1E2235"}},
            e("div",{style:{fontSize:9,color:"#4A5068",marginBottom:9,letterSpacing:1,textTransform:"uppercase"}},"RENK REHBERİ"),
            [{color:"#FF2222",label:"Yeni çalışıldı — dinlen"},{color:"#FFBB00",label:"Toparlanıyor..."},{color:"#00FF88",label:"Hazır — tekrar antrenman!"}]
              .map(x=>e("div",{key:x.color,style:{display:"flex",alignItems:"center",gap:7,marginBottom:7}},
                e("div",{style:{width:22,height:6,borderRadius:3,background:x.color,boxShadow:"0 0 5px "+x.color+"88",flexShrink:0}}),
                e("span",{style:{fontSize:10,color:"#8892A8"}},x.label)
              )),
            e("div",{style:{marginTop:10,padding:"8px 9px",background:"#1A1F30",borderRadius:8}},
              e("div",{style:{fontSize:10,color:"#6B9B8A"}},
                "💡 ",e("strong",{style:{color:"#E8ECF8"}},"PROGRAM"),
                " sekmesine geç → egzersiz ekle → 'Antrenmanı Tamamla' → kaslar otomatik işaretlenir!"
              )
            )
          )
        )
      ),

      // ── HAFTALIK PROGRAM ──
      tab==="weekly"&&e("div",{style:{marginTop:14}},
        e(WeeklyPlanner,{onDone:fromWorkout}),
        e("div",{style:{marginTop:10,background:"#111827",borderRadius:11,padding:"9px 13px",border:"1px solid #1E2235"}},
          e("div",{style:{fontSize:10,color:"#4A5068"}},
            "ℹ️ wger.de veritabanından yüklenir. ",
            e("span",{style:{color:"#4A90D9"}},"Mavi")," = ana kas · ",
            e("span",{style:{color:"#6B9B8A"}},"Yeşil")," = yan kas. Program localStorage'a kaydedilir."
          )
        )
      ),

      // ── ÖLÇÜMLER ──
      tab==="measure"&&e(Measures,{gender})
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
</body>
</html>
